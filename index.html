<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumen — private notes AI, measured in the open</title>
<meta name="description" content="Lumen is a local-first knowledge graph with transparent RAG: every answer shows its retrieval scores, exact prompt, and cost — and ships with a published benchmark you can run yourself." />
<meta property="og:title" content="Lumen — private notes AI, measured in the open" />
<meta property="og:description" content="Local-first notes RAG that shows its work, with a built-in eval lab and published quality numbers." />
<meta property="og:type" content="website" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2307080b'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%23ffd166'/%3E%3Cpath d='M16 5v4M16 23v4M5 16h4M23 16h4' stroke='%237dd3fc' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E" />
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f5f0" />
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#05060a" />
<script>
  // Apply the saved theme before first paint. Light is the default.
  // ?theme=dark|light overrides (deep links, screenshots).
  (function () {
    var theme = 'light';
    try {
      theme = new URLSearchParams(location.search).get('theme')
        || localStorage.getItem('lumen2.theme') || 'light';
    } catch (e) { /* private mode */ }
    document.documentElement.dataset.theme = theme === 'dark' ? 'dark' : 'light';
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css" />

<!-- Rendering & ingestion libs (global scripts; the app itself is ES modules in /js) -->
<script src="https://d3js.org/d3.v7.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js" defer></script>
<script defer>
  window.addEventListener('DOMContentLoaded', () => {
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js';
    }
  });
</script>
</head>
<body>
  <div id="app">
    <header id="topbar"></header>
    <main id="view-root"></main>
    <nav id="mobile-nav" aria-label="Primary (mobile)"></nav>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <noscript>
    <div style="max-width:560px;margin:80px auto;font-family:system-ui;color:#c2c9d8;padding:0 20px">
      <h1 style="color:#e7eaf2">Lumen needs JavaScript</h1>
      <p>Everything in Lumen — the graph, retrieval, embeddings, and evals — runs in your browser.
      There is no server-rendered fallback because there is no server.</p>
      <p><a style="color:#7dd3fc" href="https://github.com/sillanaresh/lumen">Read the source on GitHub →</a></p>
    </div>
  </noscript>

  <script type="module" src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lumen — pipeline tests</title>
<style>
  body { font-family: ui-monospace, monospace; background: #07080b; color: #e7eaf2; padding: 24px; font-size: 13px; }
  .pass { color: #4ade80; }
  .fail { color: #f87171; }
  h1 { font-size: 16px; }
  #summary { font-size: 15px; margin: 12px 0; }
  pre { color: #8b94ab; }
</style>
</head>
<body>
<h1>Lumen pipeline tests <span style="color:#8b94ab">— pure functions, zero dependencies</span></h1>
<div id="summary">running…</div>
<div id="out"></div>
<pre id="results"></pre>

<script type="module">
import {
  contentHash, stripMarkdown, lexicalScore, cosine, markdownBlocks, chunkNote, chunkAll,
  rankChunks, isNoAnswer, buildPrompt, parseCitations, citationPrecision,
  rankOfFirstGold, computeMetrics, metricsMarkdownTable, estimateTokens,
  isDecline, buildJudgePrompt, parseJudgeOutput, validateBenchmark, computeGenMetrics,
  buildDraftPrompt, parseDraftOutput,
  CHUNK_SIZE_CHARS,
} from './js/pipeline.js';

const results = [];
function test(name, fn) {
  try { fn(); results.push({ name, ok: true }); }
  catch (e) { results.push({ name, ok: false, error: String(e.message || e) }); }
}
function assert(cond, msg = 'assertion failed') { if (!cond) throw new Error(msg); }
function assertEq(a, b, msg = '') { if (a !== b) throw new Error(`${msg} expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`); }

const mkNote = (id, title, content, tags = []) => ({ id, title, content, tags });
const mkChunk = (over = {}) => ({
  chunkId: 'x.1', noteId: 'x', noteTitle: 'Title', ordinal: 1,
  headingPath: 'Title', tags: [], text: 'hello world', contentHash: 'h', ...over,
});

// ---------- contentHash ----------
test('contentHash is stable and collision-averse for nearby strings', () => {
  assertEq(contentHash('abc'), contentHash('abc'));
  assert(contentHash('abc') !== contentHash('abd'));
  assert(contentHash('') !== contentHash(' '));
});

// ---------- stripMarkdown ----------
test('stripMarkdown removes fences, inline code, links, emphasis', () => {
  const s = stripMarkdown('# H\n\n**bold** *em* `code`\n```js\nignored()\n```\n[label](http://x)');
  assert(!s.includes('ignored'), 'fence content should be dropped');
  assert(s.includes('bold') && s.includes('label') && s.includes('code'));
  assert(!s.includes('#') && !s.includes('*') && !s.includes('('));
});

// ---------- chunker ----------
test('short note → exactly one chunk (chunk == note)', () => {
  const chunks = chunkNote(mkNote('n1', 'Tiny', '# Tiny\n\nJust a line.'));
  assertEq(chunks.length, 1);
  assertEq(chunks[0].chunkId, 'n1.1');
});

test('heading-only note → single non-empty chunk', () => {
  const chunks = chunkNote(mkNote('n1', 'Only heading', '# Only heading'));
  assertEq(chunks.length, 1);
  assert(chunks[0].text.trim().length > 0, 'never an empty chunk');
});

test('empty content → single fallback chunk, never zero', () => {
  const chunks = chunkNote(mkNote('n1', 'Empty', ''));
  assertEq(chunks.length, 1);
  assert(chunks[0].text.trim().length > 0);
});

test('long multi-section note splits at headings with heading paths', () => {
  const para = 'A sentence about learning. '.repeat(30); // ~810 chars
  const content = `# Top\n\n${para}\n\n## Section A\n\n${para}\n\n## Section B\n\n${para}`;
  const chunks = chunkNote(mkNote('n1', 'Top', content));
  assert(chunks.length >= 2, `expected ≥2 chunks, got ${chunks.length}`);
  assert(chunks.every(c => c.text.length <= CHUNK_SIZE_CHARS + 200), 'chunks near target size');
  assert(chunks.some(c => c.headingPath.includes('Section A')), 'heading path recorded');
  chunks.forEach((c, i) => assertEq(c.chunkId, `n1.${i + 1}`, 'ordinal ids'));
});

test('oversized single paragraph hard-splits at sentence boundaries', () => {
  const content = 'This is sentence number one of many. '.repeat(80); // ~3000 chars, no headings
  const chunks = chunkNote(mkNote('n1', 'Wall', content));
  assert(chunks.length >= 2, `expected ≥2 chunks, got ${chunks.length}`);
  // continuation chunks carry a 15% overlap tail on top of the target size
  const maxAllowed = Math.round(CHUNK_SIZE_CHARS * 1.2);
  assert(chunks.every(c => c.text.length <= maxAllowed), 'chunks within target + overlap');
});

test('code fences are never split mid-fence', () => {
  const bigFence = '```js\n' + 'const x = 1;\n'.repeat(150) + '```'; // > chunk size
  const content = `# Code\n\nIntro para.\n\n${bigFence}\n\nOutro para.`;
  const blocks = markdownBlocks(content, 'Code');
  const fenceBlocks = blocks.filter(b => b.code);
  assertEq(fenceBlocks.length, 1, 'one fence block');
  assert(fenceBlocks[0].text.startsWith('```') && fenceBlocks[0].text.endsWith('```'), 'fence intact');
  const chunks = chunkNote(mkNote('n1', 'Code', content));
  const fenceChunk = chunks.find(c => c.text.includes('const x = 1;'));
  const opens = (fenceChunk.text.match(/```/g) || []).length;
  assertEq(opens % 2, 0, 'fence markers balanced inside chunk');
});

test('unclosed fence at EOF still captured', () => {
  const blocks = markdownBlocks('# T\n\n```\ndangling code', 'T');
  assert(blocks.some(b => b.text.includes('dangling code')));
});

test('chunkAll covers every note', () => {
  const notes = [mkNote('a', 'A', '# A\n\nbody'), mkNote('b', 'B', '# B\n\nbody')];
  const chunks = chunkAll(notes);
  assertEq(new Set(chunks.map(c => c.noteId)).size, 2);
});

// ---------- lexical scoring ----------
test('lexicalScore ranks the on-topic chunk above the off-topic one', () => {
  const hit = mkChunk({ text: 'Spaced repetition flattens the forgetting curve.', noteTitle: 'Spaced repetition' });
  const miss = mkChunk({ text: 'Supply and demand explains pricing and queues.', noteTitle: 'Mental models' });
  const q = 'how does spaced repetition affect forgetting?';
  assert(lexicalScore(q, hit) > lexicalScore(q, miss));
});

test('lexicalScore is 0 for stopword-only queries', () => {
  assertEq(lexicalScore('the of and', mkChunk()), 0);
});

// ---------- cosine ----------
test('cosine: identical normalized vectors → 1, orthogonal → 0, mismatch → 0', () => {
  const a = new Float32Array([1, 0]); const b = new Float32Array([0, 1]);
  assert(Math.abs(cosine(a, a) - 1) < 1e-6);
  assertEq(cosine(a, b), 0);
  assertEq(cosine(a, new Float32Array([1, 0, 0])), 0, 'dim mismatch guarded');
});

// ---------- retrieval ----------
test('rankChunks lexical mode sorts by score and respects topK', () => {
  const chunks = [
    mkChunk({ chunkId: 'a.1', noteId: 'a', text: 'sleep consolidates memory overnight', noteTitle: 'Sleep' }),
    mkChunk({ chunkId: 'b.1', noteId: 'b', text: 'interleaving beats blocking on mixed tests', noteTitle: 'Interleaving' }),
    mkChunk({ chunkId: 'c.1', noteId: 'c', text: 'curiosity is cheap attention', noteTitle: 'Curiosity' }),
  ];
  const r = rankChunks('how does sleep help memory?', chunks, { topK: 2 });
  assert(r.length <= 2);
  assertEq(r[0].chunk.chunkId, 'a.1');
  assert(r.every((x, i) => i === 0 || r[i - 1].score >= x.score), 'descending');
  assertEq(r[0].semantic, null, 'semantic null in lexical mode');
});

test('rankChunks blends semantic + lexical when vectors provided', () => {
  const chunks = [
    mkChunk({ chunkId: 'a.1', noteId: 'a', contentHash: 'ha', text: 'zzz unrelated words entirely' }),
    mkChunk({ chunkId: 'b.1', noteId: 'b', contentHash: 'hb', text: 'also unrelated zzz' }),
  ];
  const vecs = { ha: new Float32Array([1, 0]), hb: new Float32Array([0, 1]) };
  const r = rankChunks('completely different query', chunks, {
    queryVec: new Float32Array([1, 0]),
    getVec: (c) => vecs[c.contentHash],
    topK: 5,
  });
  assertEq(r[0].chunk.chunkId, 'a.1', 'cosine should dominate');
  assert(Math.abs(r[0].score - 0.72) < 1e-6, '0.72 · cosine(1) + 0.28 · lexical(0)');
});

// ---------- no-answer gate ----------
test('isNoAnswer fires on empty/weak results and not on strong ones', () => {
  assert(isNoAnswer([], 'lexical'));
  assert(isNoAnswer([{ score: 0.1 }], 'lexical'));
  assert(!isNoAnswer([{ score: 0.9 }], 'lexical'));
  assert(isNoAnswer([{ score: 0.25 }], 'semantic'));
  assert(!isNoAnswer([{ score: 0.5 }], 'semantic'));
});

// ---------- prompt ----------
test('buildPrompt includes chunk ids, question, and token estimate', () => {
  const chunks = [{ chunk: mkChunk({ chunkId: 'n01.2', noteTitle: 'Recall', headingPath: 'Recall › Mechanism', text: 'retrieval strengthens memory' }) }];
  const p = buildPrompt('why does recall work?', chunks);
  assert(p.user.includes('[n01.2]') && p.user.includes('why does recall work?'));
  assert(p.system.includes('cite') || p.system.includes('Cite'));
  assertEq(p.messages.length, 2);
  assertEq(p.inputTokens, estimateTokens(p.system + p.user));
});

test('buildPrompt with no chunks says so explicitly', () => {
  assert(buildPrompt('q', []).user.includes('no relevant chunks'));
});

// ---------- citations ----------
test('parseCitations extracts unique chunk ids in order, ignores bare note refs', () => {
  const c = parseCitations('Claim [n01.1]. More [n02.3], again [n01.1]. Bare [n05] ignored. [N04.2] case-folded.');
  assertEq(JSON.stringify(c), JSON.stringify(['n01.1', 'n02.3', 'n04.2']));
});

test('citationPrecision: half the citations point at gold notes → 0.5', () => {
  assertEq(citationPrecision(['n01.1', 'n02.1'], ['n01']), 0.5);
  assertEq(citationPrecision([], ['n01']), null, 'no citations → null, not 0');
});

// ---------- eval metrics ----------
test('rankOfFirstGold finds the first gold note position', () => {
  const results = [{ chunk: mkChunk({ noteId: 'a' }) }, { chunk: mkChunk({ noteId: 'b' }) }];
  assertEq(rankOfFirstGold(results, ['b']), 2);
  assertEq(rankOfFirstGold(results, ['z']), null);
  assertEq(rankOfFirstGold(results, []), null);
});

test('computeMetrics: hit rates, MRR, no-answer accuracy, latency quantiles', () => {
  const perCase = [
    { expected: ['a'], rank: 1, baselineRank: 2, noAnswerCorrect: null, latencyMs: 10 },
    { expected: ['b'], rank: 2, baselineRank: null, noAnswerCorrect: null, latencyMs: 20 },
    { expected: ['c'], rank: null, baselineRank: 1, noAnswerCorrect: null, latencyMs: 30 },
    { expected: [], rank: null, baselineRank: null, noAnswerCorrect: true, latencyMs: 5 },
    { expected: [], rank: null, baselineRank: null, noAnswerCorrect: false, latencyMs: 5 },
  ];
  const m = computeMetrics(perCase);
  assertEq(m.cases, 5); assertEq(m.answerable, 3); assertEq(m.noAnswer, 2);
  assert(Math.abs(m.hit1 - 1 / 3) < 1e-9);
  assert(Math.abs(m.hit5 - 2 / 3) < 1e-9);
  assert(Math.abs(m.mrr - (1 + 0.5) / 3) < 1e-9);
  assert(Math.abs(m.baselineHit5 - 2 / 3) < 1e-9);
  assertEq(m.noAnswerAccuracy, 0.5);
  assert(m.latencyP50 != null && m.latencyP95 >= m.latencyP50);
});

test('metricsMarkdownTable renders one row per run', () => {
  const run = {
    timestamp: '2026-06-11T00:00:00Z',
    config: { mode: 'lexical', topK: 5 },
    metrics: { cases: 58, hit1: 0.8, hit5: 1, mrr: 0.89, baselineHit5: 0.95, liftHit5: 0.05, noAnswerAccuracy: 0.75, latencyP50: 3 },
  };
  const md = metricsMarkdownTable([run]);
  assert(md.split('\n').length === 3);
  assert(md.includes('80%') && md.includes('0.89') && md.includes('lexical'));
});

// ---------- golden chunker fixtures ----------
// Frozen expected outputs. Changing chunking constants/logic must update these
// numbers CONSCIOUSLY — that's the point of goldens.
test('golden: short note → 1 chunk, stable hash', () => {
  const ch = chunkNote({ id: 'g1', title: 'Golden short', content: '# Golden short\n\nOne small paragraph that stays a single chunk.' });
  assertEq(ch.length, 1);
  assertEq(ch[0].contentHash, 'vdsfem');
});
test('golden: 3-section note → 3 chunks with heading paths', () => {
  const ch = chunkNote({ id: 'g2', title: 'Golden sections', content: '# Golden sections\n\n' + 'Alpha sentence about retrieval practice. '.repeat(18) + '\n\n## Beta part\n\n' + 'Beta sentence about consolidation. '.repeat(18) + '\n\n## Gamma part\n\n' + 'Gamma sentence about interleaving. '.repeat(18) });
  assertEq(ch.length, 3);
  assertEq(ch.map(c => c.headingPath).join('|'), 'Golden sections|Golden sections › Beta part|Golden sections › Gamma part');
  assertEq(ch.map(c => c.contentHash).join(','), '1p303uc,7gzfye,1qizgp0');
});
test('golden: long fence merges into one intact chunk', () => {
  const ch = chunkNote({ id: 'g3', title: 'Golden fence', content: '# Golden fence\n\nIntro line.\n\n```js\nconst keep = "together";\n' + 'line();\n'.repeat(40) + '```\n\nOutro line.' });
  assertEq(ch.length, 1);
  assertEq(ch[0].contentHash, 'umv7i3');
});

// ---------- decline detection & judge parsing ----------
test('isDecline matches the mandated refusal phrase, case-insensitive', () => {
  assert(isDecline("Your notes don't seem to cover this."));
  assert(isDecline("Sorry — your notes DON'T SEEM TO COVER THIS topic."));
  assert(!isDecline('Spaced repetition flattens the forgetting curve [n02.1].'));
});
test('parseJudgeOutput: clean JSON', () => {
  const v = parseJudgeOutput('{"score": 4, "unsupported_claims": ["claim x"]}');
  assertEq(v.score, 4); assertEq(v.unsupported.length, 1);
});
test('parseJudgeOutput: fenced + prose-wrapped JSON', () => {
  const v = parseJudgeOutput('Here is my grade:\n```json\n{"score": 5, "unsupported_claims": []}\n```\nDone.');
  assertEq(v.score, 5);
});
test('parseJudgeOutput: malformed / out-of-range → null (caller retries)', () => {
  assertEq(parseJudgeOutput('I would rate this a 4 out of 5.'), null);
  assertEq(parseJudgeOutput('{"score": 9}'), null);
  assertEq(parseJudgeOutput(''), null);
});
test('judge prompt demands strict JSON and carries question/context/answer', () => {
  const p = buildJudgePrompt('q?', [{ chunk: mkChunk({ chunkId: 'n01.1', text: 'ctx' }) }], 'the answer');
  assert(p.messages[0].content.includes('JSON'));
  assert(p.messages[1].content.includes('q?') && p.messages[1].content.includes('the answer') && p.messages[1].content.includes('[n01.1]'));
});

// ---------- draft parsing ----------
test('parseDraftOutput extracts a question, rejects junk', () => {
  assertEq(parseDraftOutput('{"question": "Why does spacing help memory?"}'), 'Why does spacing help memory?');
  assertEq(parseDraftOutput('{"question": "hi"}'), null, 'too short');
  assertEq(parseDraftOutput('no json here'), null);
});
test('draft prompt forbids verbatim copying and includes the passage', () => {
  const p = buildDraftPrompt(mkChunk({ noteTitle: 'Sleep', text: 'hippocampus replays the day' }));
  assert(p.messages[0].content.toLowerCase().includes('not copy') || p.messages[0].content.includes('do NOT copy'));
  assert(p.messages[1].content.includes('hippocampus'));
});

// ---------- benchmark validation ----------
test('validateBenchmark accepts a good set and infers categories', () => {
  const v = validateBenchmark({ cases: [
    { id: 'a', question: 'q1?', expected: ['n01'] },
    { id: 'b', question: 'q2?', expected: [] },
  ] }, new Set(['n01']));
  assert(v.ok, v.errors.join('; '));
  assertEq(v.cases[0].category, 'single-hop');
  assertEq(v.cases[1].category, 'no-answer');
});
test('validateBenchmark rejects unknown gold notes, duplicates, missing questions', () => {
  const v = validateBenchmark({ cases: [
    { id: 'a', question: 'q?', expected: ['ghost'] },
    { id: 'a', expected: [] },
  ] }, new Set(['n01']));
  assert(!v.ok);
  assert(v.errors.some(e => e.includes('ghost')));
  assert(v.errors.some(e => e.includes('Duplicate')));
  assert(v.errors.some(e => e.includes('question')));
});

// ---------- generation metrics ----------
test('computeGenMetrics aggregates precision, faithfulness, refusals; judge errors excluded', () => {
  const g = computeGenMetrics([
    { expected: ['a'], citationPrecision: 1, faithfulness: 5, judgeError: false, genDeclined: false, genMs: 100, outTokens: 50 },
    { expected: ['b'], citationPrecision: 0.5, faithfulness: null, judgeError: true, genDeclined: false, genMs: 300, outTokens: 70 },
    { expected: [], citationPrecision: null, faithfulness: null, judgeError: false, genDeclined: true, genMs: 200, outTokens: 10 },
    { expected: [], citationPrecision: null, faithfulness: null, judgeError: false, genDeclined: false, genMs: 200, outTokens: 80 },
  ]);
  assertEq(g.generated, 4);
  assert(Math.abs(g.citationPrecision - 0.75) < 1e-9);
  assertEq(g.faithfulness, 5, 'judge-error case excluded from average');
  assertEq(g.judgeErrors, 1);
  assertEq(g.genNoAnswerAccuracy, 0.5);
});
test('markdown table grows gen columns only when a run has them', () => {
  const base = { timestamp: '2026-06-12T00:00:00Z', config: { mode: 'lexical', topK: 5 }, metrics: { cases: 58, hit1: 0.8, hit5: 1, mrr: 0.9, baselineHit5: 1, liftHit5: 0, noAnswerAccuracy: 0.75, latencyP50: 1 } };
  assert(!metricsMarkdownTable([base]).includes('Faithfulness'));
  const withGen = { ...base, metrics: { ...base.metrics, gen: { citationPrecision: 0.9, faithfulness: 4.4, genNoAnswerAccuracy: 1 } } };
  const md = metricsMarkdownTable([withGen]);
  assert(md.includes('Faithfulness') && md.includes('4.4/5') && md.includes('90%'));
});

// ---------- render ----------
const out = document.getElementById('out');
const passed = results.filter(r => r.ok).length;
out.innerHTML = results.map(r =>
  `<div class="${r.ok ? 'pass' : 'fail'}">${r.ok ? '✓' : '✗'} ${r.name}${r.error ? ` — ${r.error}` : ''}</div>`
).join('');
document.getElementById('summary').innerHTML =
  `<span class="${passed === results.length ? 'pass' : 'fail'}">${passed}/${results.length} passed</span>`;
document.getElementById('results').textContent = JSON.stringify({ passed, total: results.length, failures: results.filter(r => !r.ok) }, null, 2);
document.title = `Lumen tests — ${passed}/${results.length}`;
</script>
</body>
</html>
